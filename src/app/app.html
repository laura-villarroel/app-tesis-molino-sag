<header class="topbar">
  <div class="container topbar__inner">
<input id="navToggle" class="navToggle" type="checkbox" />

<label class="navBtn" for="navToggle" aria-label="Abrir menú">
  <span></span><span></span><span></span>
</label>
 <a class="brand" routerLink="/" aria-label="Ir a inicio">
  <img class="brand__logo" src="assets/branding/sag_icon_2.svg" alt="SAG" />
  <span class="brand__divider" aria-hidden="true"></span>
  <div class="brand__text">
    <div class="brand__kicker">Asistente de Operación</div>
    <div class="brand__title">Molino SAG</div>
  </div>
</a>


   <nav class="nav navDrawer" aria-label="Navegación principal">
      <a
       *ngFor="let item of nav; trackBy: trackByPath"
        class="nav__link"
        [routerLink]="item.path"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: item.path === '/' }"
        (click)="closeMenu()"

      >
        {{ item.label }}
      </a>
    </nav>
    <label class="navOverlay" for="navToggle" aria-label="Cerrar menú"></label>
  </div>
</header>

<main class="container page">
  <router-outlet />
</main>
<app-footer></app-footer>

<h1>Anexos</h1>

<div *ngIf="vm$ | async as vm">
  <p *ngIf="vm.loading">Cargando…</p>

  <div *ngIf="vm.error" style="border:1px solid #fecaca; background:#fff1f2; padding:12px; border-radius:8px;">
    <b>Error</b>
    <div style="margin-top:6px;">{{ vm.error }}</div>
  </div>

  <ng-container *ngIf="!vm.loading && !vm.error">
    <div style="overflow:auto; border:1px solid #e5e7eb; border-radius:12px; margin-top:12px;">
      <table style="width:100%; border-collapse: collapse;">
        <thead>
          <tr style="background:#f9fafb;">
            <th style="text-align:left; padding:10px; border-bottom:1px solid #e5e7eb;">Scenario</th>
            <th style="text-align:left; padding:10px; border-bottom:1px solid #e5e7eb;">State</th>
            <th style="text-align:right; padding:10px; border-bottom:1px solid #e5e7eb;">Wear %</th>
            <th style="text-align:right; padding:10px; border-bottom:1px solid #e5e7eb;">Thickness H (mm)</th>
            <th style="text-align:right; padding:10px; border-bottom:1px solid #e5e7eb;">Power Morrell (kW)</th>
            <th style="text-align:left; padding:10px; border-bottom:1px solid #e5e7eb;">Angles</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let r of vm.rows">
            <td style="padding:10px; border-bottom:1px solid #f3f4f6;">
              <b>{{ r.key }}</b>
            </td>
            <td style="padding:10px; border-bottom:1px solid #f3f4f6;">
              {{ r.state ?? '—' }}
            </td>
            <td style="padding:10px; border-bottom:1px solid #f3f4f6; text-align:right;">
              {{ r.wearPct ?? '—' }}
            </td>
            <td style="padding:10px; border-bottom:1px solid #f3f4f6; text-align:right;">
              {{ r.thicknessH_mm ?? '—' }}
            </td>
            <td style="padding:10px; border-bottom:1px solid #f3f4f6; text-align:right;">
              {{ r.powerMorrel_kW ?? '—' }}
            </td>
            <td style="padding:10px; border-bottom:1px solid #f3f4f6;">
              <img
                *ngIf="toAssetUrl(r.anglesImage) as img"
                [src]="img"
                alt="angles"
                style="height:44px; border-radius:8px; border:1px solid #e5e7eb;"
              />
              <span *ngIf="!r.anglesImage" style="color:#6b7280;">—</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </ng-container>
</div>

name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build -- --configuration production --base-href /app-tesis-molino-sag/

      # SPA fallback (evita 404 al refrescar rutas internas)
      - name: Add SPA fallback (404.html)
        run: |
            DIST_DIR=$(ls -d dist/* | head -n 1)
            echo "DIST_DIR=$DIST_DIR"
            cp "$DIST_DIR/index.html" "$DIST_DIR/404.html"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
